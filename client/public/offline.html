<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0D1624" />
    <title>Digital Trust Fraud Shield - Offline</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: Inter, system-ui, sans-serif;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: radial-gradient(circle at top, #17223a, #050816 60%);
        color: #e5efff;
      }
      .card {
        max-width: 540px;
        margin: 24px;
        padding: 28px;
        border-radius: 24px;
        background: rgba(10, 18, 32, 0.82);
        border: 1px solid rgba(125, 201, 255, 0.18);
        box-shadow: 0 18px 50px rgba(0, 0, 0, 0.35);
      }
      h1 {
        margin: 0 0 12px;
        font-size: 28px;
      }
      p {
        line-height: 1.6;
        color: #b8c9df;
      }
      .badge {
        display: inline-block;
        margin-bottom: 14px;
        padding: 6px 12px;
        border-radius: 999px;
        background: rgba(93, 168, 255, 0.16);
        color: #9ed1ff;
        font-size: 12px;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.16em;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="badge">Offline Mode</div>
      <h1>Fraud Shield is still usable offline.</h1>
      <p>The app shell, scam scenarios, and saved report drafts are cached locally. Reconnect when ready to sync results, submit reports, and resume live detection.</p>
    </div>
  </body>
</html>
